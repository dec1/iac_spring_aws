# .github/workflows/codeql.yml
#
# CodeQL security analysis workflow for Kotlin/Spring Gradle projects.
# Uses manual build mode to avoid autobuild memory issues and keeps the run
# clearly distinguishable from the main CI/CD pipeline.

name: "Security Scan (CodeQL)"
run-name: "CodeQL security scan (for ${{ github.ref_name }})"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "28 6 * * 5"

jobs:
  analyze:
    name: Static Security Analysis (CodeQL)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Compile the project so CodeQL can observe the compiler
      - name: Compile project for CodeQL analysis
        if: matrix.build-mode == 'manual'
        working-directory: spring
        run: |
          export GRADLE_OPTS="-Xmx4g"

          # heartbeat so CI logs show activity during long Kotlin compile
          ( while true; do echo "[heartbeat] Kotlin compilation still running..."; sleep 60; done ) &
          HEARTBEAT_PID=$!

          ./gradlew clean classes testClasses \
            --no-daemon \
            --console=plain \
            --stacktrace \
            --info \
            -Dkotlin.compiler.execution.strategy=in-process

          kill $HEARTBEAT_PID || true
            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v4
              with:
                category: "/language:${{ matrix.language }}"