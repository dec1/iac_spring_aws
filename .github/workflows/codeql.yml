# .github/workflows/codeql.yml
#
# CodeQL security analysis workflow for Kotlin/Spring Gradle projects.
# Uses manual build mode to avoid autobuild memory issues.

name: "CodeQL Analysis"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "28 6 * * 5"

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Compile the project so CodeQL can observe the compiler
      - name: Build project for CodeQL
        if: matrix.build-mode == 'manual'
        run: |
          export GRADLE_OPTS="-Xmx4g"
          ./gradlew clean classes testClasses --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
