# .github/workflows/codeql.yml
#
# CodeQL security analysis workflow for Kotlin/Spring Gradle projects.
# Uses manual build mode to avoid autobuild memory issues and keeps the run
# clearly distinguishable from the main CI/CD pipeline.

name: "Security Scan (CodeQL)"
run-name: "CodeQL security scan (for ${{ github.ref_name }})"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "28 6 * * 5"

jobs:
  analyze:
    name: Static Security Analysis (CodeQL)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Only master branch writes to the cache to prevent PRs from polluting it
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Compile the project so CodeQL can observe the compiler
      - name: Compile project for CodeQL analysis
        if: matrix.build-mode == 'manual'
        working-directory: spring
        run: |
          # heartbeat so CI logs show activity during long Kotlin compile
          ( while true; do echo "[heartbeat] Kotlin compilation still running..."; sleep 60; done ) &
          HEARTBEAT_PID=$!


          # CodeQL process tracing cannot monitor background daemons.
          # We force both Gradle (--no-daemon) and Kotlin (-Pkotlin.compiler.execution.strategy=in-process) 
          # to compile in the current visible process, and allocate 4GB RAM to handle the load.
          ./gradlew clean classes testClasses \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            --no-daemon \
            --no-build-cache \
            --console=plain \
            --stacktrace \
            --info \
            -Pkotlin.compiler.execution.strategy=in-process

          kill $HEARTBEAT_PID || true
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"