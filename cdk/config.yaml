# ------------------------------------------------------------------
#             CDK specific configuration.
# ------------------------------------------------------------------


# ------------------------------------------------------------------------
#   imported (config_common)
# ------------------------------------------------------------------------
# Values marked "null" below MUST be supplied by config_common.yaml
# (at repo root). config-reader.ts merges both files at runtime and
# will throw if any of these remain null after the merge.
# ------------------------------------------------------

# --- Supplied by config_common.yaml (do not set here) ---
serviceName: null          # from config_common.yaml
imageSource: null          # from config_common.yaml
imageRepositoryName: null  # from config_common.yaml
appVersion: null           # from config_common.yaml


# ------------------------------------------------------------------------
# ------------------------------------------------------------------------


# --- Custom domain (optional) ---
# Set both if you want to be able to serve your app via Https, and get:
# - ACM certificates and Route 53 DNS records (e.g. dev.api.my-domain.com)
# - HTTPS listener on the ALB (TLS terminates at the ALB)
#
# If you omit these your app will still be served via the default ALB DNS name but only over HTTP  (no HTTPS/TLS)
apexDomain:     ""    # e.g. "my-domain.com"
hostedZoneId:   ""    # the Route 53 hosted zone ID managing DNS for the specified apexDomain



# ---------------------------------------------------


appPortNum: 8080
terminationWaitTimeMinutes: 5
wantGrafana: false

ci:

  # gitlab:
  #   url: "https://gitlab.com/"
  #   runnerTokenSecretName: "GitlabRunnerToken-my-backend"       #  enter this value when creating runner 'connector' in GitLab ui (matches "tag" in .ci file)
  #   runnerTag: "my-backend-runner-tag"                          #  enter this value as "tag"  in GitLab ui ( specify jobs that the runner can run)
  
  github:
    org: "dec1"
    repo: "iac_spring_aws"                                         # git repo name - which runner is "working" for. github requires you specify. (gitlab doesnt - presumably encoded in the token instead)
    runnerTokenSecretName: "GithubRunnerToken-my-backend"      # ........................................... in GitHub ui (matches "runner_labels" in .ci file)
    runnerLabels:
      - "my-backend-runner-label"                              #  ................... "label" ... GitHub ui .........

# Shared defaults applied to every environment block below.
# Environment-specific values override these (shallow merge).
_defaults:
  healthCheckPath: "/actuator/health"
  s3BucketIsCdkManaged: true
  computePlatform: "ecs"                       

dev:
  stagingEnvironment: "dev"                     # primarily used for tagging (cost tracking), and so runner can find the dev vpc to install into
  s3BucketName: "my-backend-bucket-dev"
  hostnamePrefix: "dev.api2"                     # prepended to apexDomain as fqdn for service (alb) 

release:
  stagingEnvironment: "release"                 
  s3BucketName: "my-backend-bucket-release"    
  hostnamePrefix: "api2"                         

k8s-dev:
  stagingEnvironment: "dev"       
  computePlatform: "kubernetes"
  s3BucketName: "my-backend-bucket-k8s-dev"
  hostnamePrefix: "k8s.dev.api2"

k8s-release:
  stagingEnvironment: "release"
  computePlatform: "kubernetes"
  s3BucketName: "my-backend-bucket-k8s-release"
  hostnamePrefix: "k8s.api2"

#-------------------------------------------------------------------------------------------
# EKS admin role ARN for local kubectl access (EKS only).

# Leave empty => only CI (EksDeployRole) will have kubectl admin access.
# You can regain access later using:
#   cdk/app/lib/constructs/platform/eks/script/fix-eks-access

eksAdminRoleArn: ""

# EKS uses AWS IAM authentication for Kubernetes access.
# Creating the cluster does NOT automatically grant kubectl access to your local identity.
#
# During deployment the stack creates an EksDeployRole that CI assumes.
# This role is mapped to Kubernetes `system:masters` so CI can configure the cluster.
#
# The CI role follows the principle of least privilege: it only receives the
# permissions required to deploy and configure the cluster. Its permissions are
# constrained by the IAM privileges of the identity that performs the initial
# CDK deployment (i.e., you or whoever bootstraps/deploys the stack locally).
#
# If you want kubectl access from your local machine, set this value to the IAM role
# ARN of your AWS identity so it is mapped during cluster creation.

# Get your current identity ARN:
#   aws sts get-caller-identity --query Arn --output text --profile <your-profile>
#
# Example output (SSO session):
#   arn:aws:sts::123456789012:assumed-role/AWSReservedSSO_AdminAccess_abc123/user@example.com
#
# Convert it to the IAM role ARN by removing the session name and replacing:
#   sts -> iam
#   assumed-role -> role
#
# Result:
#   arn:aws:iam::123456789012:role/AWSReservedSSO_AdminAccess_abc123
#
# If the command already returns an arn:aws:iam:: ARN, use it directly.
#
# One-liner conversion:
#   aws sts get-caller-identity --query Arn --output text --profile <your-profile> \
#   | sed -E 's|^arn:aws:sts::([0-9]+):assumed-role/(.+)/[^/]+$|arn:aws:iam::\1:role/\2|'
